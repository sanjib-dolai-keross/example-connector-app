<!DOCTYPE html>
<html lang="en" class="h-full">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IKON Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="login.css">

</head>

<body class=" h-full text-white w-full body-style">

<div class="flex h-full w-full">
    <div class="flex flex-col md:flex-row overflow-hidden rounded-lg shadow-lg w-full">
        
        <!-- Left Section -->
        <div class="flex flex-col h-full justify-center md:w-1/3 p-10 w-full">
            <img src="assets/images/dark/keross-logo.png" alt="Keross Logo" class="p-3 mb-6 left-ikon-logo">
            <blockquote class="quote">
                "Step into the future of<br>
                <strong>Collaboration with our AI-Agent</strong><br>
                <strong>Domain Experts.</strong>"
            </blockquote>
            
            
        </div>
        <div class="terminal-video flex flex-col items-center justify-center md:w-1/3 p-10 w-full">
            <video width="500" class="terminal-video" autoplay muted>
                <source src="assets/terminal.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>

</div>
        <!-- Right Section (Login Form) -->
        <div class="flex flex-col items-center justify-center md:w-1/3 p-10 w-full">
            <img src="assets/images/dark/ikon-logo.png" alt="IKON Logo" class="right-ikon-logo mb-4">
            <p class="text-gray-300 mb-6">Harness the Power of Data</p>
            
            <form class="p-10 pt-0 w-3/4">
                <div class="mb-4">
                    <input id="userName" type="text" class="w-full p-3 bg-[#111827] text-white border-none rounded-md focus:ring-2 focus:ring-[#8a86ff]" placeholder="Username" value="K2303106">
                </div>
                <div class="mb-4">
                    <input type="password" id="userPassword" class="w-full p-3 bg-[#111827] text-white border-none rounded-md focus:ring-2 focus:ring-[#8a86ff]" placeholder="Password" value="**********">
                </div>
                <div class="text-right mb-4">
                    <a href="#" class="text-[#8a86ff] text-sm">Forgot Password?</a>
                </div>
                <div class="flex gap-2">
                    <button type="reset"  id="resetLoginBtn" class="w-1/2 p-3 bg-gray-600 rounded-md hover:bg-gray-500">Reset</button>
                    <button type="submit" id="submitLoginBtn" class="w-1/2 p-3 bg-[#635bff] rounded-md hover:bg-[#5249db]">Login</button>
                </div>
            </form>
            
            <p class="text-gray-400 text-sm mt-4">Looking for Support?<br>Version 8.0.0</p>

            <footer class="mt-4 text-sm text-gray-400">
                <a href="http://keross.com/about" target="_blank" class="hover:underline">About Us</a> | 
                <a href="http://keross.com/contact" target="_blank" class="hover:underline">Get in Touch</a> | 
                <a href="http://keross.com/privacy-policy" target="_blank" class="hover:underline">Privacy Policy</a>
            </footer>
        </div>
    </div>
</div>

<!-- Alert Container -->
<div id="alertContainer" class="bottom-5 fixed right-5 space-y-2 z-50"></div>

<script src="login.js"></script>

</body>
</html>
