# Default values for BPMN Process Demo Application
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global values shared across all subcharts
global:
  # Global image pull secret configuration for private Harbor registry
  imagePullSecret:
    enabled: true # Set to true to enable image pull secret for all charts
    registry: "hub.ikoncloud.com"
    username: "admin" # Harbor username
    password: "Kero$$4321" # Harbor password or robot token

  # Alternative: Reference existing secrets
  # imagePullSecrets: []
  # - name: harbor-registry

# Frontend subchart configuration
frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: hub.ikoncloud.com/ikon-applications/dac-example-app-frontend
    tag: "dev-1"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 450m
      memory: 512Mi

  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 5

  env:
    - name: IKON_LOGIN_PAGE_URL
      value: "https://holocron.keross.com/ikon-portal/login.html"
    - name: IKON_API_URL
      value: "https://holocron.keross.com/api"
    - name: API_BASE_URL
      value: "https://holocron.keross.com/api/dac-example-app/v1"
    - name: BASE_PATH
      value: "/apps/dac-example-app/v1"
    - name: IKON_PLATFORM_UI_URL
      value: "https://holocron.keross.com/ikon-portal"

# Backend subchart configuration
backend:
  enabled: true
  replicaCount: 1

  image:
    repository: hub.ikoncloud.com/ikon-applications/dac-example-app-backend
    tag: dev-1
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8070

  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 450m
      memory: 1Gi

  livenessProbe:
    initialDelaySeconds: 290
    periodSeconds: 10

  readinessProbe:
    initialDelaySeconds: 290
    periodSeconds: 5

  env: []
